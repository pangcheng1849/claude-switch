name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      INPUT_TAG: ${{ inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          if [[ "$TAG" == *-* ]]; then
            echo "::error::Pre-release tags are not supported (got '$TAG')"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG_NAME' does not match package.json version (expected '$EXPECTED')"
            exit 1
          fi

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
